name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test deps
        run: |
          python -m pip install --upgrade pip
          # Native ML-KEM requires cryptography>=48 built against a PQC-capable
          # backend. CI wheels may not expose it; the suite skips KAT tests and
          # the backend probe handles absence gracefully.
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest -v

      - name: Report active ML-KEM backend
        run: |
          python -c "import xwing_kem; print('backend:', xwing_kem.active_backend())" || \
            echo "No ML-KEM backend on this runner (expected on some OpenSSL builds)."

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
