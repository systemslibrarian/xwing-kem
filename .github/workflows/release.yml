name: Release

# Publishes xwing-kem to PyPI via Trusted Publishing (OpenID Connect).
# No API token is stored: PyPI verifies the workflow's OIDC identity.
#
# IMPORTANT: the filename of THIS file (release.yml) is what you enter in the
# "Workflow name" field when configuring the Trusted Publisher on PyPI.

on:
  push:
    tags:
      - "v*"          # publish when a version tag like v0.1.0 is pushed
  workflow_dispatch:  # allow manual runs from the Actions tab

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # This environment name must match the "Environment name" you set on PyPI
    # (recommended) and a GitHub Actions environment of the same name.
    environment:
      name: pypi
      url: https://pypi.org/project/xwing-kem/
    permissions:
      id-token: write          # REQUIRED for Trusted Publishing (OIDC)
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
